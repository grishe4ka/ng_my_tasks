<div class="home-container">
    <h1>My Tasks</h1>

    <ul>
        <li *ngFor="let task of tasks()">
            <a [routerLink]="['/task', task.id]">{{ task.title }}</a>
            <div *ngIf(task.isCompleted)>
                <p>Completed</p>
            </div>
        </li>
    </ul>
    <div>
        <app-task-add></app-task-add>
    </div>
</div>
